<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civitas - Dashboard</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-logo">
                <span>Civitas</span><div class="logo-dot"></div>
            </div>
            <div class="header-search">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Buscar no sistema...">
            </div>
            <div class="header-avatar">G</div>
        </header>

        <main class="container page-content">
    
    <div id="view-dashboard">
        <div class="actions-header" style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
            <button id="btn-abrir-formulario" class="btn-nova-solicitacao">
                + Criar Nova Solicitação
            </button>
        </div>
        
        </div>


    <div id="view-formulario" style="display: none;">
        <div class="actions-header" style="margin-bottom: 16px;">
            <button id="btn-voltar-dashboard" class="btn-voltar">
                ⬅ Voltar para o Dashboard
            </button>
        </div>

        <form id="form-new-request" class="request-form">
            <fieldset class="form-section">
                <legend class="section-title">INFORMAÇÕES DE CONTATO:</legend>
                <div class="anonimo-checkbox-group">
                    <input type="checkbox" id="anonimo" name="anonimo">
                    <label for="anonimo">Desejo fazer uma denúncia anônima (Opcional)</label>
                </div>
                <div id="contato-fields" class="form-grid-2">
                    <div class="form-control"><label>Nome Completo:</label><input type="text" id="nome"></div>
                    <div class="form-control"><label>E-mail:</label><input type="email" id="email"></div>
                    <div class="form-control"><label>Telefone:</label><input type="text" id="telefone"></div>
                    <div class="form-control"><label>CPF:</label><input type="text" id="cpf"></div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend class="section-title">CATEGORIA DO PROBLEMA</legend>
                <div class="checkbox-grid">
                    <label class="radio-label"><input type="radio" name="category" value="FLOORING" required> Infraestrutura</label>
                    <label class="radio-label"><input type="radio" name="category" value="LIGHTING"> Iluminação</label>
                    <label class="radio-label"><input type="radio" name="category" value="SANITATION"> Saneamento</label>
                    <label class="radio-label"><input type="radio" name="category" value="HEALTH"> Saúde</label>
                    <label class="radio-label"><input type="radio" name="category" value="SCHOOL_SAFETY"> Segurança</label>
                    <label class="radio-label"><input type="radio" name="category" value="ENVIRONMENT"> Meio Ambiente</label>
                    <label class="radio-label"><input type="radio" name="category" value="OTHER" id="radio-outro"> Outro</label>
                </div>
                <div class="form-control mt-3" id="group-outro-texto" style="display: none;">
                    <input type="text" id="outro-texto" placeholder="Qual área?">
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend class="section-title">PROBLEMA</legend>
                <div class="form-control">
                    <label>Descreva qual o seu problema:</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <div class="form-grid-cep">
                    <div class="form-control"><label>CEP:</label><input type="text" id="cep" required></div>
                    <div class="form-control"><label>Endereço:</label><input type="text" id="endereco" required></div>
                </div>
                <div class="form-grid-endereco-detalhes">
                    <div class="form-control"><label>Bairro:</label><input type="text" id="bairro" required></div>
                    <div class="form-control"><label>Cidade:</label><input type="text" id="cidade" required></div>
                    <div class="form-control"><label>Estado:</label><input type="text" id="estado" required></div>
                    <div class="form-control"><label>Número:</label><input type="text" id="numero" required></div>
                </div>
            </fieldset>

            <div class="form-actions">
                <button type="submit" id="btn-enviar-solicitacao" class="btn-submit">Enviar Solicitação</button>
            </div>
        </form>
    </div>
</main>


        <div id="bottom-bar-container"></div>
    </div>

    <script src="../js/api/api.js"></script>
    <script src="../js/components/bottom-bar.js"></script>
    <script src="../js/pages/dashboard.js"></script>
</body>
</html>
