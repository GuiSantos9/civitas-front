<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civitas - Autenticação</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-shell login-shell">
        <main class="login-container">
            
            <div class="login-brand text-center mb-4">
                <h1 class="brand-title">Civitas<span class="logo-dot"></span></h1>
                <p class="text-muted">Zeladoria Urbana e Gestão Pública</p>
            </div>

            <div class="card">
                <div class="card-header justify-center">
                    <h2 class="card-title">Acessar o Sistema</h2>
                </div>
                
                <form id="form-login" class="mt-4">
                    <div class="form-group">
                        <label class="form-label" for="username">Usuário ou E-mail</label>
                        <input type="text" id="username" name="username" class="form-input" required placeholder="Digite seu usuário">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Senha</label>
                        <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
                    </div>

                    <div id="login-error-message" class="form-error text-center mb-4" style="display: none;">
                        Usuário ou senha inválidos.
                    </div>

                    <button type="submit" id="btn-entrar" class="btn btn-primary btn-full">
                        <span>Entrar</span>
                    </button>
                </form>
            </div>

        </main>
    </div>

    <script src="../js/api/api.js"></script>
    <script src="../js/pages/login.js"></script>
</body>
</html>
