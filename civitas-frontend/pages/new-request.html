<main class="container page-content">
    <form id="form-new-request" class="request-form">
        
        <fieldset class="form-section">
            <legend class="section-title">INFORMAÇÕES DE CONTATO:</legend>
            
            <div class="anonimo-checkbox-group">
                <input type="checkbox" id="anonimo" name="anonimo">
                <label for="anonimo">Desejo fazer uma denúncia anônima (Opcional)</label>
            </div>

            <div id="contato-fields" class="form-grid-2">
                <div class="form-control">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome">
                </div>
                <div class="form-control">
                    <label for="email">E-mail de contato:</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-control">
                    <label for="telefone">Telefone:</label>
                    <input type="text" id="telefone" name="telefone" placeholder="(44) 99999-9999">
                </div>
                <div class="form-control">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
                </div>
            </div>
        </fieldset>

        <fieldset class="form-section">
            <legend class="section-title">CATEGORIA DO PROBLEMA</legend>
            <div class="checkbox-grid">
                <label class="radio-label">
                    <input type="radio" name="category" value="FLOORING" required> Infraestrutura
                </label>
                <label class="radio-label">
                    <input type="radio" name="category" value="LIGHTING"> Iluminação
                </label>
                <label class="radio-label">
                    <input type="radio" name="category" value="SANITATION"> Saneamento
                </label>
                <label class="radio-label">
                    <input type="radio" name="category" value="HEALTH"> Saúde
                </label>
                <label class="radio-label">
                    <input type="radio" name="category" value="SCHOOL_SAFETY"> Segurança
                </label>
                <label class="radio-label">
                    <input type="radio" name="category" value="ENVIRONMENT"> Meio Ambiente
                </label>
                <label class="radio-label">
                    <input type="radio" name="category" value="OTHER" id="radio-outro"> Outro
                </label>
            </div>
            <div class="form-control mt-3" id="group-outro-texto" style="display: none;">
                <input type="text" id="outro-texto" placeholder="Digite qual é a outra área">
            </div>
        </fieldset>

        <fieldset class="form-section">
            <legend class="section-title">PROBLEMA</legend>
            
            <div class="form-control">
                <label for="description">Descreva qual o seu problema:</label>
                <textarea id="description" name="description" rows="4" required></textarea>
            </div>

            <div class="form-grid-cep">
                <div class="form-control">
                    <label for="cep">CEP:</label>
                    <div class="search-input-wrapper">
                        <input type="text" id="cep" name="cep" placeholder="87000-000" required>
                    </div>
                </div>
                <div class="form-control">
                    <label for="endereco">Endereço:</label>
                    <input type="text" id="endereco" name="endereco" required>
                </div>
            </div>

            <div class="form-grid-endereco-detalhes">
                <div class="form-control">
                    <label for="bairro">Bairro:</label>
                    <input type="text" id="bairro" name="bairro" required>
                </div>
                <div class="form-control">
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="cidade" name="cidade" required>
                </div>
                <div class="form-control">
                    <label for="estado">Estado:</label>
                    <input type="text" id="estado" name="estado" required>
                </div>
                <div class="form-control">
                    <label for="numero">Número:</label>
                    <input type="text" id="numero" name="numero" required>
                </div>
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" id="btn-enviar-solicitacao" class="btn-submit">Enviar</button>
        </div>
    </form>
</main>
