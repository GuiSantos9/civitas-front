<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civitas - Nova Solicitação</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/request-form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-logo"><span>Civitas</span><div class="logo-dot"></div></div>
            <div class="header-avatar">U</div>
        </header>

        <main class="page-content">
            <form id="form-solicitacao" class="request-form">
                <section class="form-section">
                    <h2 class="form-section-title">Categoria</h2>
                    <div class="category-grid">
                        <label class="category-option">
                            <input type="radio" name="category" value="FLOORING" checked>
                            <span class="custom-checkbox"></span> Infraestrutura
                        </label>
                        <label class="category-option">
                            <input type="radio" name="category" value="LIGHTING">
                            <span class="custom-checkbox"></span> Iluminação
                        </label>
                        <label class="category-option">
                            <input type="radio" name="category" value="HEALTH">
                            <span class="custom-checkbox"></span> Saúde
                        </label>
                        <label class="category-option">
                            <input type="radio" name="category" value="SCHOOL_SAFETY">
                            <span class="custom-checkbox"></span> Segurança
                        </label>
                    </div>
                </section>

                <section class="form-section">
                    <h2 class="form-section-title">Problema</h2>
                    <div class="form-group">
                        <textarea name="description" rows="3" required placeholder="Descreva o problema..."></textarea>
                    </div>
                    <div class="form-group">
                        <input type="text" id="cep" placeholder="CEP">
                        <input type="text" name="location" required placeholder="Endereço Completo">
                    </div>
                </section>

                <div class="form-actions"><button type="submit" class="btn-submit-form">Enviar</button></div>
            </form>
        </main>
        <div id="bottom-bar-container"></div>
    </div>
    <script src="../js/api/api.js"></script>
    <script src="../js/components/bottom-bar.js"></script>
    <script src="../js/pages/request-form.js"></script>
</body>
</html>
